# Local guardrail layer paired with CI. See ADR-0003.
#
# First-time setup:
#   pip install pre-commit
#   pre-commit install --install-hooks
#   pre-commit install --hook-type commit-msg   # for commitlint
#
# Run on demand:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-yaml
      - id: check-json
        exclude: tsconfig.json

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        stages: [pre-commit]
        additional_dependencies:
          - prettier@3.3.0

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        # Pinned to the same version package.json resolves via
        # @commitlint/cli / @commitlint/config-conventional. Both layers
        # (this commit-msg hook AND scripts/precheck-pr-title.mjs) read
        # commitlint.config.cjs, so rule semantics must match exactly.
        # Bump in lockstep with package.json. See ADR-0004.
        additional_dependencies:
          - "@commitlint/config-conventional@19.8.1"
