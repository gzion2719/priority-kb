# Local guardrail layer paired with CI. See ADR-0003.
#
# First-time setup:
#   pip install pre-commit
#   pre-commit install --install-hooks
#   pre-commit install --hook-type commit-msg   # for commitlint
#
# Run on demand:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-yaml
      - id: check-json
        exclude: tsconfig.json

  # Local hook: runs the project's own devDeps prettier (see package.json).
  # Replaced the pre-commit/mirrors-prettier hook on 2026-05-26 — that repo
  # was archived 2024-04-11 and its latest tag (v4.0.0-alpha.8) shipped
  # prettier 3.x pre-stable, drifting from this project's pinned 3.8.3.
  # Using the local devDeps prettier keeps the hook and `npm run format:check`
  # (the CI gate) on the exact same binary — no version drift possible.
  - repo: local
    hooks:
      - id: prettier
        name: prettier (project devDeps)
        entry: npx prettier --write --ignore-unknown
        language: system
        stages: [pre-commit]

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        # Pinned to the same version package.json resolves via
        # @commitlint/cli / @commitlint/config-conventional. Both layers
        # (this commit-msg hook AND scripts/precheck-pr-title.mjs) read
        # commitlint.config.cjs, so rule semantics must match exactly.
        # Bump in lockstep with package.json. See ADR-0004.
        additional_dependencies:
          - "@commitlint/config-conventional@19.8.1"
