name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node — lint, format, types, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Advisory only — surfaces high/critical CVEs in the job log without
      # blocking merge. Dependabot opens fix PRs. See ADR-0003.
      - name: npm audit (advisory)
        run: npm audit --audit-level=high || true

  # Python lane — activated when M2b adds the FastAPI worker under api/.
  # Until api/ exists, this job is a no-op skip.
  python:
    name: Python — ruff, black, mypy, pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Python project
        id: detect
        run: |
          if [ -d "api" ] && [ -f "pyproject.toml" ] && grep -q '"fastapi"' pyproject.toml; then
            echo "active=true" >> $GITHUB_OUTPUT
          else
            echo "active=false" >> $GITHUB_OUTPUT
            echo "Python lane not yet active (M2b will activate)."
          fi

      - name: Setup Python
        if: steps.detect.outputs.active == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        if: steps.detect.outputs.active == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        if: steps.detect.outputs.active == 'true'
        run: ruff check api/

      - name: Black
        if: steps.detect.outputs.active == 'true'
        run: black --check api/

      - name: Mypy
        if: steps.detect.outputs.active == 'true'
        run: mypy --strict api/

      - name: Pytest
        if: steps.detect.outputs.active == 'true'
        run: pytest api/ --cov

  evals:
    name: Retrieval evals (M3+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for eval set
        id: detect
        run: |
          if [ -f "evals/golden_set.yaml" ] && grep -q "expected_source_ids: \[.*[a-zA-Z0-9]" evals/golden_set.yaml; then
            echo "active=true" >> $GITHUB_OUTPUT
          else
            echo "active=false" >> $GITHUB_OUTPUT
            echo "Eval set not yet populated (M3 will activate)."
          fi

      # Eval runner wiring lands in M3 — keeps the job structure visible from day one.
