name: CI

on:
  push:
    # `dev` deliberately omitted: every PR targeting `dev` already fires
    # the `pull_request` trigger below, and we use merge commits (ADR-0002
    # §"Merge mechanics") so post-merge state == PR state + merge commit
    # (no code change). The post-merge push-to-dev run was always
    # redundant. `main` stays for post-release-merge confirmation on the
    # deployable line. See ADR-0011 Amendment 2026-05-25 — wave-2 trim.
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node — lint, format, types, tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/priority_kb
    services:
      postgres:
        # Pinned in lockstep with docker-compose.yml's `services.db.image`.
        # See that file for the bump procedure.
        image: pgvector/pgvector:pg16@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: priority_kb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d priority_kb"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      # Apply db/init.sql as the bootstrap superuser — mirrors what
      # docker-entrypoint-initdb.d does in local dev (ADR-0008 §10). The service
      # container starts before checkout, so we apply init.sql here rather than
      # mounting it. App-DB-role split is deferred (see BACKLOG); migrations run
      # as `postgres` for now.
      - name: Apply db/init.sql (bootstrap)
        run: psql "$DATABASE_URL" -f db/init.sql

      - name: Run migrations
        run: npm run db:migrate

      - name: Test
        run: npm test

      # Advisory only — surfaces high/critical CVEs in the job log without
      # blocking merge. Dependabot opens fix PRs. See ADR-0003.
      - name: npm audit (advisory)
        run: npm audit --audit-level=high || true

  e2e:
    name: E2E — page-status assertions (next start subprocess)
    runs-on: ubuntu-latest
    # Independent of the `node` job — both fire on the same events in
    # parallel. e2e flake should not block lint/typecheck/unit-test signal.
    # ADR-0014 §4 for the runtime decision.
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/priority_kb
    services:
      postgres:
        # Same pinned digest as the `node` job above — bump in lockstep
        # with docker-compose.yml.
        image: pgvector/pgvector:pg16@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: priority_kb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d priority_kb"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Apply db/init.sql (bootstrap)
        run: psql "$DATABASE_URL" -f db/init.sql

      - name: Run migrations
        run: npm run db:migrate

      # `next start` requires a built .next/ directory. Build once here
      # so the e2e suite can spawn the server quickly per describe block.
      - name: Build
        run: npm run build

      - name: E2E
        run: npm run e2e

  python:
    name: Python — ruff, black, mypy, pytest
    runs-on: ubuntu-latest
    # Independent of the `node` + `e2e` jobs. All three fire in parallel on
    # `pull_request` + `push: [main]`; the top-level `concurrency:` group
    # cancels in-progress runs for the same ref. The Python lane was removed
    # 2026-05-21 (ADR-0011 cost-trim) and reintroduced here at M2b #2 (FastAPI
    # worker scaffold) per ROADMAP line "Python FastAPI worker scaffolded at
    # api/; pyproject.toml activated."
    #
    # Postgres service added 2026-05-26 at M2b #3 (ADR-0019 job queue) —
    # api/tests/test_jobs.py exercises real claim_one + mark_done + mark_failed
    # SQL against the jobs table. Mirrors the node job's service block + the
    # db/init.sql + npm run db:migrate sequence so the Python tests run
    # against the same schema the Node tests see.
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/priority_kb
    services:
      postgres:
        # Same pinned digest as the `node` + `e2e` jobs — bump in lockstep
        # with docker-compose.yml.
        image: pgvector/pgvector:pg16@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: priority_kb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d priority_kb"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node (for drizzle-kit migrate)
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Python
        # Editable install so the api/ package + dev-extras are importable in
        # the same venv ruff / black / mypy / pytest run against.
        run: pip install -e ".[dev]"

      - name: Install Node (for drizzle-kit migrate)
        # Migrations are owned by drizzle-kit per ADR-0008; the Python job
        # runs them via `npm run db:migrate` (same command the node + e2e
        # jobs use) so the schema the Python tests see matches the Node
        # tests' schema exactly.
        run: npm ci

      - name: Apply db/init.sql (bootstrap)
        run: psql "$DATABASE_URL" -f db/init.sql

      - name: Run migrations
        run: npm run db:migrate

      - name: Install Tesseract OCR (native binary + Hebrew/English data)
        # M2b #6 (ADR-0022 A9) — the Tesseract production fallback shells out
        # to this binary. tesseract-ocr-heb + -eng are the language packs the
        # adapter requests via lang="heb+eng"; fonts-dejavu-core gives PIL a
        # Hebrew-glyph font so the real-binary smoke can render + round-trip a
        # Hebrew word. The sandbox has no Tesseract, so this CI job is the only
        # gate that exercises the real binary (Platform-runtime-matching).
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-heb tesseract-ocr-eng fonts-dejavu-core

      - name: py-check
        # Single Make target chains ruff + black --check + mypy --strict + pytest;
        # mirrors what `make py-check` does locally so CI and dev share one entry
        # point. See SESSION_PROTOCOL.md §Python pre-push.
        run: make py-check

  evals:
    name: Evals — recall@5 shape/smoke gate (npm run eval)
    runs-on: ubuntu-latest
    # Reintroduced 2026-05-28 at M3 #7 (eval runner + populated golden set).
    # The eval lane was removed 2026-05-21 (ADR-0011 cost-trim); the ROADMAP
    # M3 line "Eval runner reports recall@5 …; CI runs it on PR" now holds.
    #
    # SCOPE (honest): at n=3 ready cases against a 3-entry seeded corpus,
    # top-5 trivially returns all entries, so recall@5 is ~1.0 regardless of
    # ranking. This job is therefore a SHAPE / SMOKE gate — it catches a
    # pipeline crash, a schema break, or a DB-wiring break (any of which makes
    # `npm run eval` exit non-zero via shape_error) — NOT yet a recall-quality
    # regression guard. It BECOMES a real recall gate once the 27-entry seed
    # lands (n ≥ 20) + the real Voyage embedder is wired (ROADMAP M3
    # Acceptance double-gate). `npm run eval` exits non-zero ONLY on
    # shape_error > 0; recall-below-target does not fail the job.
    #
    # NO live synth: EVAL_USE_LIVE_SYNTH + ANTHROPIC_API_KEY are intentionally
    # unset, so the eval runs stub-only (no live Anthropic call — iron rule
    # #8). citation_precision reports `skipped`. Live citation_precision is a
    # manual opt-in smoke per ADR-0012 §K–§O, never CI.
    #
    # Depends on a CLEAN ephemeral Postgres (fresh per run): the seed pins
    # fixed UUIDs (evals/fixture-ids.ts) so a fresh DB reproduces the exact
    # ids the golden set anchors to. Stray entries from a persisted DB would
    # dilute the top-5 and could drop recall below 1.0.
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/priority_kb
    services:
      postgres:
        # Same pinned digest as the node / e2e / python jobs — bump in
        # lockstep with docker-compose.yml.
        image: pgvector/pgvector:pg16@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: priority_kb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d priority_kb"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Apply db/init.sql (bootstrap)
        run: psql "$DATABASE_URL" -f db/init.sql

      - name: Run migrations
        run: npm run db:migrate

      - name: Seed synthetic-fixture entries
        # Pinned-UUID seed (evals/fixture-ids.ts) so the golden set's
        # expected_source_ids resolve against this fresh DB.
        run: npx tsx scripts/seed-synthetic-entries.ts --apply

      - name: Run eval (shape/smoke; fails only on shape_error)
        run: npm run eval
