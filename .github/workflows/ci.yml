name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node — lint, format, types, tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/priority_kb
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: priority_kb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d priority_kb"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      # Apply db/init.sql as the bootstrap superuser — mirrors what
      # docker-entrypoint-initdb.d does in local dev (ADR-0008 §10). The service
      # container starts before checkout, so we apply init.sql here rather than
      # mounting it. App-DB-role split is deferred (see BACKLOG); migrations run
      # as `postgres` for now.
      - name: Apply db/init.sql (bootstrap)
        run: psql "$DATABASE_URL" -f db/init.sql

      - name: Run migrations
        run: npm run db:migrate

      - name: Test
        run: npm test

      # Advisory only — surfaces high/critical CVEs in the job log without
      # blocking merge. Dependabot opens fix PRs. See ADR-0003.
      - name: npm audit (advisory)
        run: npm audit --audit-level=high || true

  # Python lane removed 2026-05-21 per ADR-0011 BACKLOG cost-trim entry.
  # Reintroduce when ROADMAP M2b line "Python FastAPI worker scaffolded at api/;
  # pyproject.toml activated" lands. The prior block ran an unconditional
  # checkout + detect step that consumed ~1 billed minute per CI run despite
  # all real work being gated off by steps.detect.outputs.active.
  #
  # Eval lane removed 2026-05-21 per the same entry. Reintroduce when ROADMAP M3
  # line "Eval runner (npm run eval or pytest evals/) reports recall@5, citation
  # precision; CI runs it on PR" lands and evals/golden_set.yaml is populated
  # past the placeholder skeleton.
