name: security

on:
  push:
    branches: [main, dev]
  pull_request:
  schedule:
    # Weekly re-scan on Monday 06:00 UTC (catches new gitleaks rules / regexes
    # against existing history without waiting for a PR).
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write
  checks: write

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # gitleaks needs full history on push-to-default-branch to catch
          # historical leaks; on PRs it scans the diff range only.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Comment-on-PR is noisy; surface findings via the Actions UI / SARIF.
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"

  # CodeQL deferred — Code Scanning must first be enabled in the repo settings
  # (Settings → Code security → Code scanning). Re-enable this job once that's
  # done; the path-filter trap means it must stay advisory (NOT in required
  # status checks). See ADR-0003.
