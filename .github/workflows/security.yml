name: security

on:
  push:
    branches: [main, dev]
  pull_request:
  schedule:
    # Weekly CodeQL re-scan on Monday 06:00 UTC.
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs full history on push-to-default-branch to catch
          # historical leaks; on PRs it scans the diff range only.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Comment-on-PR is noisy; surface findings via the Actions UI / SARIF.
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    # CodeQL is path-filtered to source code only — it is intentionally NOT in
    # required-status-checks (path-filtered + required = pending-forever block).
    # See ADR-0003.
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
