name: pr-title

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate Conventional Commit PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowlist matches ADR-0002 + ADR-0003. `release` is reserved for
          # `dev → main` promotion PRs.
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            release
          requireScope: false
          # Subject must start lowercase to match the repo's existing commit style.
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            starts with a lowercase character.
