version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    target-branch: "dev"
    labels:
      - "dependencies"
      - "npm"
    groups:
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    target-branch: "dev"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-all:
        applies-to: version-updates
        patterns:
          - "*"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  # Python (pip) ecosystem — deferred until M2b adds a lockfile (uv.lock or
  # requirements.txt). Without a lockfile, Dependabot is noisy and skips
  # transitive pins. See ADR-0003.
  #
  # - package-ecosystem: "pip"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"
  #     day: "monday"
  #   target-branch: "dev"
