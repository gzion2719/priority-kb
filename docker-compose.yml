services:
  db:
    image: pgvector/pgvector:pg16
    container_name: priority-kb-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: priority_kb
    ports:
      - "5432:5432"
    volumes:
      - priority_kb_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d priority_kb"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  priority_kb_pgdata:
